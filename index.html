<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Students Info</title>
    <link href="https://cdn.jsdelivr.net/npm/tailwindcss@2.1.2/dist/tailwind.min.css" rel="stylesheet">
</head>
<body class="bg-gray-200">
    <header class="py-5 bg-blue-900 text-white text-xl text-center">
      <h1>Student and Teacher Information</h1>
    </header>
    <main class="container mx-auto p-4">
      <div class="flex flex-wrap -m-4">
        <div id="students" class="w-full lg:w-1/2 p-4">
            <h2 class="text-2xl font-semibold mb-4">Students Info</h2>
            <!-- Students list will be populated here -->
        </div>
        <div id="teachers" class="w-full lg:w-1/2 p-4">
            <h2 class="text-2xl font-semibold mb-4">Teachers Info</h2>
            <!-- Teachers list will be populated here -->
        </div>
      </div>
    </main>
</body>
</html>
